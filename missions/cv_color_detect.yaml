name: Color Detection Mission

actions:
  - type: takeoff
    height_ft: 3

  - type: hover
    duration_secs: 2

  # Scan for a red object for up to 20 seconds; land when found
  # Supported colors: red, green, blue, yellow
  - type: on_detect
    target: color
    color: red
    on_found: land      # options: hover, land
    timeout_secs: 20

  - type: land
